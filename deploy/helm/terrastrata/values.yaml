# Default values for terrastrata.

image:
  repository: ghcr.io/pascalinthecloud/terrastrata
  tag: "" # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Number of replicas. Keep at 1 with a ReadWriteOnce PVC (the default). For
# high availability, run multiple replicas in S3-backed mode — see the HA recipe:
#
#   replicaCount: 3
#   persistence.enabled: false   # local cache becomes a per-pod emptyDir
#   s3.enabled: true             # shared durable layer all replicas read/write
#   podDisruptionBudget.enabled: true
#
# Each replica keeps its own fast local cache and shares durability via S3; a
# cold object may be fetched up to once per replica (in-process coalescing is
# per-pod), still far below per-request. A ReadWriteOnce PVC cannot be shared, so
# replicaCount > 1 with persistence.enabled=true is rejected at render time
# unless the PVC is ReadWriteMany.
replicaCount: 1

# Core configuration (maps to terrastrata env vars).
config:
  listenAddr: ":8080"
  upstreamBase: "https://registry.terraform.io"
  logLevel: "info"
  # Versions-index freshness window (Go duration); "0" disables expiry.
  indexTTL: "10m"
  # Local cache size budget (e.g. "18GB"); empty/"0" disables eviction. Set a few
  # GB below persistence.size so the volume never fills.
  cacheMaxBytes: ""

# Optional startup cache pre-warming.
#   providers: list of "[host/]namespace/type[@version]"
#   platforms: os_arch list to warm zips for (@version entries only)
prewarm:
  providers: []
  platforms:
    - linux_amd64

# Optional bearer-token auth on mirror endpoints.
# When auth.existingSecret is set, the token is read from it (key: AUTH_TOKEN);
# otherwise auth.token is used to create a Secret. Empty = auth disabled.
auth:
  enabled: false
  token: ""
  existingSecret: ""

# Optional durable S3-compatible cache layer.
s3:
  enabled: false
  bucket: ""
  prefix: "tf-mirror"
  endpoint: "" # e.g. https://s3.de.io.cloud.ovh.net (leave blank for AWS)
  region: "us-east-1"
  # Provide credentials inline (chart creates a Secret) or via existingSecret
  # with keys S3_ACCESS_KEY / S3_SECRET_KEY.
  accessKey: ""
  secretKey: ""
  existingSecret: ""

# Local filesystem fast cache. When enabled, a PVC is mounted at /cache. Disable
# it (enabled: false) to use a per-pod emptyDir instead — required for
# multi-replica HA, where the durable S3 layer is shared and the local layer is
# just an ephemeral per-pod accelerator.
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 20Gi

# Optional PodDisruptionBudget — keeps a minimum number of replicas available
# during voluntary disruptions (node drains, rolling updates). Only meaningful
# with replicaCount > 1; enable it for HA.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1   # set one of minAvailable / maxUnavailable, not both

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: tf-mirror.internal
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Pod- and container-level hardening. Defaults match the distroless nonroot image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

serviceAccount:
  create: true
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

nodeSelector: {}
tolerations: []

# Pod affinity/anti-affinity. Left empty by default; when replicaCount > 1 and
# this is empty, the chart injects a soft (preferred) anti-affinity so replicas
# prefer to spread across nodes. Set this to take full control.
affinity: {}

# Optional topologySpreadConstraints (rendered verbatim when set). Use for hard
# spreading across zones/nodes in HA, e.g.:
#   - maxSkew: 1
#     topologyKey: kubernetes.io/hostname
#     whenUnsatisfiable: ScheduleAnyway
#     labelSelector:
#       matchLabels:
#         app.kubernetes.io/name: terrastrata
topologySpreadConstraints: []
