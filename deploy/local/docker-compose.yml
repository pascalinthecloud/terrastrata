# Local test stack: terrastrata + Prometheus + Grafana.
#
#   docker compose up --build
#
# Then:
#   - mirror:     http://localhost:8080
#   - Grafana:    http://localhost:3000   (anonymous admin, dashboard "terrastrata")
#   - Prometheus: http://localhost:9090
#
# To also exercise the durable S3 layer, add the MinIO overlay:
#   docker compose -f docker-compose.yml -f docker-compose.s3.yml up --build
name: terrastrata-local

services:
  terrastrata:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: terrastrata:local
    ports:
      - "8080:8080"
    environment:
      LOG_LEVEL: debug
      INDEX_TTL: 10m
      # Bound the local cache so the evictor runs and publishes
      # terrastrata_cache_size_bytes / eviction metrics. Lower it (e.g. 200MB) to
      # force eviction during a test; raise it to cache more.
      CACHE_MAX_BYTES: "2GB"
    volumes:
      - cache:/cache
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.6.0
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - terrastrata
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.1.0
    ports:
      - "3000:3000"
    environment:
      # Frictionless local access: no login, anonymous admin.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: "dark"
    volumes:
      # Mount only the subdirs we provide, so Grafana's built-in (empty) plugins/
      # alerting provisioning dirs aren't masked.
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  cache:
  prometheus-data:
  grafana-data:
