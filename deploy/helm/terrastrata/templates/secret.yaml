{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "terrastrata.fullname" . }}-auth
  labels:
    {{- include "terrastrata.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_TOKEN: {{ required "auth.token is required when auth.enabled and no existingSecret is set" .Values.auth.token | quote }}
{{- end }}
{{- if and .Values.s3.enabled (not .Values.s3.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "terrastrata.fullname" . }}-s3
  labels:
    {{- include "terrastrata.labels" . | nindent 4 }}
type: Opaque
stringData:
  S3_ACCESS_KEY: {{ required "s3.accessKey is required when s3.enabled and no existingSecret is set" .Values.s3.accessKey | quote }}
  S3_SECRET_KEY: {{ required "s3.secretKey is required when s3.enabled and no existingSecret is set" .Values.s3.secretKey | quote }}
{{- end }}
