{{- if and (gt (int .Values.replicaCount) 1) .Values.persistence.enabled (eq .Values.persistence.accessMode "ReadWriteOnce") }}
{{- fail "terrastrata: replicaCount > 1 needs persistence.enabled=false (S3-backed HA) or a ReadWriteMany persistence.accessMode — a ReadWriteOnce PVC cannot be shared across replicas. See the HA recipe in values.yaml." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "terrastrata.fullname" . }}
  labels:
    {{- include "terrastrata.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- if .Values.persistence.enabled }}
    type: Recreate # required for a ReadWriteOnce PVC
    {{- else }}
    type: RollingUpdate
    {{- end }}
  selector:
    matchLabels:
      {{- include "terrastrata.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "terrastrata.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "terrastrata.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LISTEN_ADDR
              value: {{ .Values.config.listenAddr | quote }}
            - name: CACHE_DIR
              value: "/cache"
            - name: UPSTREAM_BASE
              value: {{ .Values.config.upstreamBase | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: INDEX_TTL
              value: {{ .Values.config.indexTTL | quote }}
            {{- if .Values.config.cacheMaxBytes }}
            - name: CACHE_MAX_BYTES
              value: {{ .Values.config.cacheMaxBytes | quote }}
            {{- end }}
            {{- if .Values.prewarm.providers }}
            - name: PREWARM_PROVIDERS
              value: {{ join "," .Values.prewarm.providers | quote }}
            - name: PREWARM_PLATFORMS
              value: {{ join "," .Values.prewarm.platforms | quote }}
            {{- end }}
            {{- if .Values.auth.enabled }}
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "terrastrata.authSecretName" . }}
                  key: AUTH_TOKEN
            {{- end }}
            {{- if .Values.s3.enabled }}
            - name: S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            - name: S3_PREFIX
              value: {{ .Values.s3.prefix | quote }}
            - name: S3_ENDPOINT
              value: {{ .Values.s3.endpoint | quote }}
            - name: S3_REGION
              value: {{ .Values.s3.region | quote }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "terrastrata.s3SecretName" . }}
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "terrastrata.s3SecretName" . }}
                  key: S3_SECRET_KEY
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: cache
              mountPath: /cache
      volumes:
        - name: cache
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "terrastrata.fullname" . }}-cache
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else if gt (int .Values.replicaCount) 1 }}
      # Multi-replica default: prefer spreading replicas across nodes.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "terrastrata.selectorLabels" . | nindent 20 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
