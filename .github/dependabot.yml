# Dependabot keeps dependencies and pinned actions current.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Go modules.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"
    groups:
      # Batch low-risk updates into a single PR to cut review noise.
      go-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions pinned in .github/workflows/*.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]

  # Base image in the Dockerfile.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "build(deps)"
