# terrastrata — Kubernetes manifests
#
# Apply with:  kubectl apply -f deploy/k8s/manifests.yaml
#
# This deploys a single-replica, S3-optional mirror. For S3-backed durability,
# uncomment the Secret and the S3 env block in the Deployment.
---
apiVersion: v1
kind: Namespace
metadata:
  name: tf-mirror
  labels:
    app.kubernetes.io/name: terrastrata
---
# Durable cache credentials (optional). Replace the values, or delete this Secret
# and the S3 env block below to run local-cache-only.
# apiVersion: v1
# kind: Secret
# metadata:
#   name: tf-mirror-s3
#   namespace: tf-mirror
# type: Opaque
# stringData:
#   S3_ACCESS_KEY: "REPLACE_ME"
#   S3_SECRET_KEY: "REPLACE_ME"
# ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tf-mirror-cache
  namespace: tf-mirror
  labels:
    app.kubernetes.io/name: terrastrata
spec:
  accessModes:
    - ReadWriteOnce # RWO -> single replica + Recreate strategy below
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terrastrata
  namespace: tf-mirror
  labels:
    app.kubernetes.io/name: terrastrata
spec:
  replicas: 1
  strategy:
    type: Recreate # required for a ReadWriteOnce PVC
  selector:
    matchLabels:
      app.kubernetes.io/name: terrastrata
  template:
    metadata:
      labels:
        app.kubernetes.io/name: terrastrata
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532 # lets the nonroot user write the mounted PVC
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: terrastrata
          image: ghcr.io/pascalinthecloud/terrastrata:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: CACHE_DIR
              value: "/cache"
            - name: LOG_LEVEL
              value: "info"
            - name: INDEX_TTL # versions-index freshness window; "0" disables expiry
              value: "10m"
            # --- Optional startup cache pre-warming ---
            # - name: PREWARM_PROVIDERS # [host/]ns/type[@version], comma-separated
            #   value: "hashicorp/azurerm@3.110.0,hashicorp/null"
            # - name: PREWARM_PLATFORMS
            #   value: "linux_amd64"
            # --- Optional S3 durable cache ---
            # - name: S3_BUCKET
            #   value: "tf-mirror"
            # - name: S3_ENDPOINT
            #   value: "https://s3.de.io.cloud.ovh.net"
            # - name: S3_REGION
            #   value: "de"
            # - name: S3_ACCESS_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: tf-mirror-s3
            #       key: S3_ACCESS_KEY
            # - name: S3_SECRET_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: tf-mirror-s3
            #       key: S3_SECRET_KEY
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true # /cache is a writable volume
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: cache
              mountPath: /cache
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: tf-mirror-cache
---
apiVersion: v1
kind: Service
metadata:
  name: tf-mirror
  namespace: tf-mirror
  labels:
    app.kubernetes.io/name: terrastrata
spec:
  selector:
    app.kubernetes.io/name: terrastrata
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
# ---
